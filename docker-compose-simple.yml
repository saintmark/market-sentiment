version: '3.8'

# ============================================================
# 市场情绪分析系统 - 简化版 Docker Compose 配置
# 去掉 Kafka/ClickHouse，使用 PostgreSQL + Redis 直接处理
# ============================================================

services:
  # ==========================================================
  # PostgreSQL - 主数据库（简化版所有数据都存这里）
  # ==========================================================
  postgres:
    image: postgres:15-alpine
    container_name: ms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres123}
      POSTGRES_DB: ${POSTGRES_DB:-market_sentiment}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-simple.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-market_sentiment}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - ms-network
    deploy:
      resources:
        limits:
          memory: 1G

  # ==========================================================
  # Redis - 缓存
  # ==========================================================
  redis:
    image: redis:7-alpine
    container_name: ms-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ms-network
    deploy:
      resources:
        limits:
          memory: 256M

  # ==========================================================
  # API 服务 - FastAPI 网关
  # ==========================================================
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: ms-api
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres123}@postgres:5432/${POSTGRES_DB:-market_sentiment}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - KIMI_API_KEY=${KIMI_API_KEY}
      - API_HOST=0.0.0.0
      - API_PORT=8000
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - ms-network
    deploy:
      resources:
        limits:
          memory: 512M

  # ==========================================================
  # NLP 服务 - 情感分析（简化版直接写 PostgreSQL）
  # ==========================================================
  nlp:
    build:
      context: ./services/nlp
      dockerfile: Dockerfile
    container_name: ms-nlp
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres123}@postgres:5432/${POSTGRES_DB:-market_sentiment}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - KIMI_API_KEY=${KIMI_API_KEY}
      - KIMI_API_URL=${KIMI_API_URL:-https://api.moonshot.cn/v1}
      - NLP_MODEL=${NLP_MODEL:-moonshot-v1-8k}
      - NLP_BATCH_SIZE=5
      - POLL_INTERVAL=30
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ms-network
    deploy:
      resources:
        limits:
          memory: 512M

  # ==========================================================
  # 数据采集服务 - RSS 抓取
  # ==========================================================
  collector:
    build:
      context: ./services/collector
      dockerfile: Dockerfile
    container_name: ms-collector
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres123}@postgres:5432/${POSTGRES_DB:-market_sentiment}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - RSS_FEED_URL=${RSS_FEED_URL:-https://36kr.com/feed}
      - COLLECT_INTERVAL=${COLLECT_INTERVAL:-300}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ms-network
    deploy:
      resources:
        limits:
          memory: 256M

  # ==========================================================
  # Web 前端 - React Dashboard
  # ==========================================================
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: ms-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3000}:80"
    depends_on:
      - api
    networks:
      - ms-network
    deploy:
      resources:
        limits:
          memory: 128M

# ============================================================
# 网络配置
# ============================================================
networks:
  ms-network:
    driver: bridge

# ============================================================
# 数据卷
# ============================================================
volumes:
  postgres_data:
  redis_data: